server:
  port: 8081
spring:
  application:
    name: teatime
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/teatime?useSSL=false&serverTimezone=UTC
    username: root
    password: "123321"
  redis:
    host: 127.0.0.1
    port: 6379
    password: "123321"
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
logging:
  level:
    com.teatime: debug
teatime:
  ai:
    service:
      url: ${AI_SERVICE_URL:http://localhost:8000}
      timeout: 30000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always