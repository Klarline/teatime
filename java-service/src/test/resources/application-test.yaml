spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:teatime_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER_CASE=TRUE
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
teatime:
  upload:
    dir: ${java.io.tmpdir}/teatime-upload-test
